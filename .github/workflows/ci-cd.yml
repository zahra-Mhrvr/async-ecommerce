name: Enterprise CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:

env:
  IMAGE_NAME: async-ecommerce

jobs:

# =========================
# 1. CI - Unit Tests (FAST)
# =========================
  ci-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v


# =========================
# 2. Build Docker Image
# =========================
  build:
    needs: ci-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:latest .

      - name: Save image artifact
        run: docker save $IMAGE_NAME:latest > image.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar


# =========================
# 3. Staging - Integration Test
# =========================
  staging:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load < image.tar

      - name: Run container (staging)
        run: docker run -d -p 8000:8000 --name app $IMAGE_NAME:latest

      - name: Wait for API readiness (robust)
        run: |
          for i in {1..20}; do
            if curl -s http://localhost:8000/health | grep -q "ok"; then
              echo "Service is ready"
              exit 0
            fi
            echo "Waiting for service..."
            sleep 2
          done
          echo "Service failed to start"
          docker logs app
          exit 1

      - name: Run smoke tests
        run: pytest scripts/smoke_test.py -v


# =========================
# 4. Production Gate
# =========================
  production:
    needs: staging
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Awaiting manual approval
        run: echo "Manual approval required before production deployment"